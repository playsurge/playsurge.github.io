<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Surge</title>
  <style>
    :root {
      --bg-dark: radial-gradient(circle at center, #4b0082 0%, #1a001f 100%);
      --bg-light: #f4f4f4;
      --color-dark: white;
      --color-light: black;
      --navbar-dark: rgba(48, 0, 70, 0.9);
      --navbar-light: #e0e0e0;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg-dark);
      color: var(--color-dark);
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }

    .glow {
      position: absolute;
      border-radius: 50%;
      background: rgba(128, 0, 255, 0.4);
      box-shadow: 0 0 60px 20px rgba(128, 0, 255, 0.3);
      z-index: 0;
    }
    .glow1 { width: 200px; height: 200px; top: 10%; left: 10%; }
    .glow2 { width: 300px; height: 300px; bottom: 10%; right: 10%; }

    .navbar {
      background: var(--navbar-dark);
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      z-index: 999;
      width: 100%;
      box-sizing: border-box;
    }
    .navbar.top {
      position: fixed;
      top: 0;
      left: 0;
    }
    .navbar.bottom {
      position: fixed;
      bottom: 0;
      left: 0;
    }

    .nav-logo {
      font-size: 1.5rem;
      font-weight: bold;
      margin-right: 1rem;
    }
    .nav-tabs {
      display: flex;
      gap: 1rem;
      flex-wrap: nowrap;
      flex: 1;
      overflow-x: auto;
    }
    .nav-tabs button {
      background: transparent;
      color: inherit;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .nav-tabs button:hover {
      text-decoration: underline;
    }

    .tab-content {
      padding: 5rem 2rem 2rem 2rem;
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    .settings-section {
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="glow glow1"></div>
  <div class="glow glow2"></div>

  <div class="navbar top" id="navbar">
    <div class="nav-logo">Surge</div>
    <div class="nav-tabs">
      <button onclick="showTab('home')">Home</button>
      <button onclick="showTab('games')">Games</button>
      <button onclick="showTab('about')">About</button>
      <button onclick="showTab('settings')">Settings</button>
    </div>
  </div>

  <div id="home" class="tab-content active">
    <h1>Welcome to Surge</h1>
    <p>Your go-to gaming zone with a powerful vibe.</p>
  </div>

  <div id="games" class="tab-content">
    <h1>Our Games</h1>
    <p>Browse and play all your favorite games right here.</p>
  </div>

  <div id="about" class="tab-content">
    <h1>About Surge</h1>
    <p>Built by gamers, for gamers. Surge is your ultimate digital playground.</p>
  </div>

  <div id="settings" class="tab-content">
    <h1>Settings</h1>
    <div class="settings-section">
      <label>
        <input type="checkbox" id="themeToggle" onchange="toggleTheme()" />
        Light Theme
      </label>
    </div>
    <div class="settings-section">
      <label>
        Navbar Position:
        <select id="navbarPosition">
          <option value="top">Top</option>
          <option value="bottom">Bottom</option>
        </select>
      </label>
    </div>
  </div>

  <script>
    window.onload = () => {
      const theme = localStorage.getItem('theme') || 'dark';
      if (theme === 'light') {
        document.getElementById('themeToggle').checked = true;
        setLightTheme();
      } else {
        setDarkTheme();
      }

      const position = localStorage.getItem('navbar') || 'top';
      document.getElementById('navbarPosition').value = position;
      setNavbarPosition(position);

      document.getElementById('navbarPosition').addEventListener('change', handleNavbarChange);
    };

    function showTab(id) {
      document.querySelectorAll('.tab-content').forEach(tab => {
        tab.classList.remove('active');
      });
      document.getElementById(id).classList.add('active');
    }

    function toggleTheme() {
      const light = document.getElementById('themeToggle').checked;
      if (light) {
        setLightTheme();
        localStorage.setItem('theme', 'light');
      } else {
        setDarkTheme();
        localStorage.setItem('theme', 'dark');
      }
    }

    function setLightTheme() {
      document.body.style.background = '#f4f4f4';
      document.body.style.color = 'black';
      document.querySelector('.navbar').style.background = '#e0e0e0';
    }

    function setDarkTheme() {
      document.body.style.background = getComputedStyle(document.documentElement).getPropertyValue('--bg-dark');
      document.body.style.color = getComputedStyle(document.documentElement).getPropertyValue('--color-dark');
      document.querySelector('.navbar').style.background = getComputedStyle(document.documentElement).getPropertyValue('--navbar-dark');
    }

    function setNavbarPosition(position) {
      const navbar = document.getElementById('navbar');
      navbar.classList.remove('top', 'bottom');
      navbar.classList.add(position);
    }

    function handleNavbarChange() {
      const select = document.getElementById('navbarPosition');
      const value = select.value;
      setNavbarPosition(value);
      localStorage.setItem('navbar', value);
    }
  </script>
</body>
</html>
