<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Surge</title>
  <style>
    :root {
      --bg-dark: radial-gradient(circle at center, #4b0082 0%, #1a001f 100%);
      --bg-light: #f4f4f4;
      --color-dark: white;
      --color-light: black;
      --navbar-dark: rgba(48, 0, 70, 0.9);
      --navbar-light: #e0e0e0;
      --accent: #b266ff;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg-dark);
      color: var(--color-dark);
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }

    .glow {
      position: absolute;
      border-radius: 50%;
      background: rgba(128, 0, 255, 0.4);
      box-shadow: 0 0 60px 20px rgba(128, 0, 255, 0.3);
      z-index: 0;
    }
    .glow1 { width: 200px; height: 200px; top: 10%; left: 10%; }
    .glow2 { width: 300px; height: 300px; bottom: 10%; right: 10%; }

    .navbar {
      background: var(--navbar-dark);
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      z-index: 999;
      width: 100%;
      box-sizing: border-box;
      position: fixed;
      top: 0;
      left: 0;
    }

    .nav-logo {
      font-size: 1.5rem;
      font-weight: bold;
      margin-right: 1rem;
    }

    .nav-tabs {
      display: flex;
      gap: 1rem;
      flex-wrap: nowrap;
      flex: 1;
      overflow-x: auto;
      position: relative;
    }
    .nav-tabs button {
      position: relative;
      background: transparent;
      color: inherit;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      white-space: nowrap;
      padding: 0.5rem;
    }
    .nav-tabs button:hover,
    .nav-tabs button.active {
      outline: none;
    }
    .nav-tabs button.active::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 3px;
      background-color: var(--accent);
      animation: underline 0.3s ease forwards;
    }
    @keyframes underline {
      from { width: 0; }
      to { width: 100%; }
    }

    .tab-content {
      padding: 5rem 2rem 2rem 2rem;
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    .settings-section {
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="glow glow1"></div>
  <div class="glow glow2"></div>

  <div class="navbar" id="navbar">
    <div class="nav-logo">Surge</div>
    <div class="nav-tabs">
      <button onclick="showTab('home')" id="tab-home" class="active">Home</button>
      <button onclick="showTab('games')" id="tab-games">Games</button>
      <button onclick="showTab('about')" id="tab-about">About</button>
      <button onclick="showTab('settings')" id="tab-settings">Settings</button>
    </div>
  </div>

  <div id="home" class="tab-content active">
    <h1>Welcome to Surge</h1>
    <p>Your go-to gaming zone with a powerful vibe.</p>
  </div>

  <div id="games" class="tab-content">
    <div id="game-library" class="game-library"></div>
  </div>

  <div id="about" class="tab-content">
    <h1>About Surge</h1>
    <p>Built by gamers, for gamers. Surge is your ultimate digital playground.</p>
  </div>

  <div id="settings" class="tab-content">
    <h1>Settings</h1>
    <div class="settings-section">
      <label>
        <input type="checkbox" id="themeToggle" onchange="toggleTheme()" />
        Light Theme
      </label>
    </div>
  </div>

  <script>
    window.onload = () => {
      const theme = localStorage.getItem('theme') || 'dark';
      if (theme === 'light') {
        document.getElementById('themeToggle').checked = true;
        setLightTheme();
      } else {
        setDarkTheme();
      }
    };

    function showTab(id) {
      document.querySelectorAll('.tab-content').forEach(tab => {
        tab.classList.remove('active');
      });
      document.getElementById(id).classList.add('active');

      document.querySelectorAll('.nav-tabs button').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`tab-${id}`).classList.add('active');
    }

    function toggleTheme() {
      const light = document.getElementById('themeToggle').checked;
      if (light) {
        setLightTheme();
        localStorage.setItem('theme', 'light');
      } else {
        setDarkTheme();
        localStorage.setItem('theme', 'dark');
      }
    }

    function setLightTheme() {
      document.body.style.background = '#f4f4f4';
      document.body.style.color = 'black';
      document.querySelector('.navbar').style.background = '#e0e0e0';
    }

    function setDarkTheme() {
      document.body.style.background = getComputedStyle(document.documentElement).getPropertyValue('--bg-dark');
      document.body.style.color = getComputedStyle(document.documentElement).getPropertyValue('--color-dark');
      document.querySelector('.navbar').style.background = getComputedStyle(document.documentElement).getPropertyValue('--navbar-dark');
    }
  </script>
</body>
</html>
